name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    uses: ./.github/workflows/build.yml

  version:
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Determine version bump
        id: bump
        working-directory: packages/blockly
        run: |
          RELEASE_TYPE=$(npx conventional-recommended-bump --preset conventionalcommits -t blockly-)
          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"
          echo "Recommended bump: $RELEASE_TYPE"

      - name: Apply version bump
        working-directory: packages/blockly
        run: npm version ${{ steps.bump.outputs.release_type }} --no-git-tag-version

      - name: Read new version
        id: version
        working-directory: packages/blockly
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $VERSION"

      - name: Update lockfile
        run: npm install

      - name: Upload versioned files
        uses: actions/upload-artifact@v4
        with:
          name: versioned-files
          path: |
            packages/blockly/package.json
            package-lock.json

  publish:
    needs: version
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download versioned files
        uses: actions/download-artifact@v4
        with:
          name: versioned-files

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/blockly/package.json package-lock.json
          git commit -m "release: v${{ needs.version.outputs.version }}"
          git push

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        working-directory: packages/blockly
        run: npm run package

      - name: Publish to npm
        working-directory: packages/blockly/dist
        run: npm publish

      - name: Create tarball
        working-directory: packages/blockly
        run: npm pack ./dist

      - name: Create GitHub release
        working-directory: packages/blockly
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TARBALL="blockly-${{ needs.version.outputs.version }}.tgz"
          gh release create "blockly-v${{ needs.version.outputs.version }}" "$TARBALL" \
            --repo "$GITHUB_REPOSITORY" \
            --title "blockly-v${{ needs.version.outputs.version }}" \
            --generate-notes
